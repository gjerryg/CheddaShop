    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        /* STICKY HEADER STYLING */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(26, 26, 26, 0.9); /* Transparent dark background */
            backdrop-filter: blur(10px); /* Blurs content behind it */
            padding: 20px 10px;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        body {
            font-family: 'Bungee', cursive;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 0; /* Changed to 0 so header hits the top */
            margin: 0;
        }

        .chedda { color: #0bd2f4; }
        .coin { color: #ed7612; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        #searchBar {
            padding: 12px;
            width: 250px;
            font-family: 'Bungee', cursive;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #222;
            color: white;
        }

        .control-btn, #sortSelect {
            background-color: #444;
            color: white;
            border: 2px solid #555;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Bungee', cursive;
            font-size: 14px;
            transition: 0.2s;
        }

        #favToggle.active {
            background-color: #ffcf40;
            color: #000;
            border-color: #ffcf40;
        }

        #sortSelect {
            color: #0bd2f4;
            border-color: #0bd2f4;
            outline: none;
        }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }

        .item {
            background: #2a2a2a;
            padding: 50px 20px 20px 20px; 
            border-radius: 20px;
            width: 220px;
            border: 2px solid #333;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .item:hover {
            transform: scale(1.05);
            border-color: #0bd2f4;
        }

        .fav-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            width: auto;
            color: transparent;
            -webkit-text-stroke: 2px #ffcf40; 
            transition: transform 0.1s ease;
        }

        .fav-btn.is-fav {
            color: #ffcf40;
            -webkit-text-stroke: 0px;
        }

        .item img {
            width: 100%;
            height: 150px;
            object-fit: contain; 
            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .item h3 {
            font-size: 18px;
            margin: 10px 0 5px 0;
            color: #ffffff;
            text-shadow: 1px 1px 0px #000;
        }

        .command-hint {
            color: #0bd2f4;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .copy-btn {
            font-family: 'Bungee', cursive;
            background-color: #ed7612;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px #8a450b;
        }
    </style>

    let showFavoritesOnly = false;
    let favorites = JSON.parse(localStorage.getItem('cheddaFavs')) || [];

    // MAIN BRAIN: Processes Filtering, Searching, and Sorting all at once
    function processShop() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const sortType = document.getElementById('sortSelect').value;
        const container = document.getElementById('shop-container');

        // 1. FILTERING (Search + Favorites)
        let items = soundEffects.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchText) || 
                                 item.command.toLowerCase().includes(searchText);
            const matchesFav = showFavoritesOnly ? favorites.includes(item.command) : true;
            return matchesSearch && matchesFav;
        });

        // 2. SORTING
        items.sort((a, b) => {
            if (sortType === "az") return a.name.localeCompare(b.name);
            if (sortType === "low") return a.price - b.price;
            if (sortType === "high") return b.price - a.price;
        });

        // 3. DISPLAY
        container.innerHTML = "";
        if (items.length === 0) {
            container.innerHTML = "<p style='color:#888; margin-top:50px;'>Nothing found!</p>";
            return;
        }

        items.forEach(effect => {
            const isFav = favorites.includes(effect.command) ? "is-fav" : "";
            container.innerHTML += `
                <div class="item">
                    <button class="fav-btn ${isFav}" onclick="toggleFavorite('${effect.command}')">★</button>
                    <img src="images/${effect.img}" alt="${effect.name}">
                    <h3>${effect.name}</h3>
                    <div class="command-hint">${effect.command}</div>
                    <p>${effect.price} Coins</p>
                    <button class="copy-btn" onclick="copyCommand(this, '${effect.command}')">Copy Command</button>
                </div>
            `;
        });
    }

    function toggleFavorite(cmd) {
        if (favorites.includes(cmd)) {
            favorites = favorites.filter(f => f !== cmd);
        } else {
            favorites.push(cmd);
        }
        localStorage.setItem('cheddaFavs', JSON.stringify(favorites));
        processShop(); // Refresh view
    }

    function toggleFavFilter() {
        showFavoritesOnly = !showFavoritesOnly;
        document.getElementById('favToggle').classList.toggle('active');
        processShop();
    }

    function copyCommand(btn, cmd) {
        navigator.clipboard.writeText(cmd);
        const originalText = "COPY COMMAND";
        btn.innerText = "COPIED!";
        btn.style.backgroundColor = "#28a745";
        setTimeout(() => { 
            btn.innerText = originalText; 
            btn.style.backgroundColor = "#ed7612"; 
        }, 1200);
    }

    // Initialize
    processShop();
