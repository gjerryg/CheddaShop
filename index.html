            padding: 15px;

            max-width: 400px;
            font-family: 'Bungee', cursive;
            font-size: 18px;
            margin-bottom: 40px;
            border-radius: 10px;
            border: 3px solid #333;
            background: #222;
            color: white;
        }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .item {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 20px;
            width: 220px;
            border: 2px solid #333;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item:hover {
            transform: scale(1.05);
            border-color: #0bd2f4;
        }

        .item img {
            width: 100%;
            height: 150px;

            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .item h3 {
            font-size: 18px;
            margin: 10px 0 5px 0;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000;
        }

        /* STYLING FOR THE VISIBLE COMMAND */
        .command-hint {
            color: #0bd2f4;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px dashed #444;
        }

        .item p.price-tag {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        button {
            font-family: 'Bungee', cursive;
            background-color: #ed7612;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            box-shadow: 0 4px #8a450b;
            transition: 0.1s;
        }

        button:active {
            box-shadow: 0 0px #8a450b;
            transform: translateY(4px);
        }

        button:hover {
            background-color: #ff8c2e;
        }
    </style>

    const container = document.getElementById('shop-container');

    function displayShop(items) {
        container.innerHTML = ""; 
        items.forEach(effect => {
            container.innerHTML += `
                <div class="item">
                    <img src="images/${effect.img}" alt="${effect.name}">
                    <h3>${effect.name}</h3>
                    <div class="command-hint">${effect.command}</div>
                    <p class="price-tag">${effect.price} Coins</p>
                    <button onclick="copyCommand(this, '${effect.command}')">Copy Command</button>
                </div>
            `;
        });
    }

    function filterShop() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const filteredItems = soundEffects.filter(item => 
            item.name.toLowerCase().includes(searchText) || 
            item.command.toLowerCase().includes(searchText)
        );
        displayShop(filteredItems);
    }

    function copyCommand(btn, cmd) {
        navigator.clipboard.writeText(cmd).then(() => {
            console.log("Copied " + cmd);
        }).catch(err => {
            console.error('Failed to copy: ', err);
        });

        // Visual Feedback on button
        const originalText = "COPY COMMAND";
        btn.innerText = "COPIED!";
        btn.style.backgroundColor = "#28a745"; // Success green

        setTimeout(() => { 
            btn.innerText = originalText; 
            btn.style.backgroundColor = "#ed7612"; // Back to orange
        }, 1200);
    }

    displayShop(soundEffects);
