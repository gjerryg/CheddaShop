<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 10px;
            border-bottom: 2px solid #333;
        }

        body {
            font-family: 'Bungee', cursive;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 0;
            margin: 0;
        }

        .chedda { color: #0bd2f4; }
        .coin { color: #ed7612; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .tab-btn {
            background-color: #333;
            color: #888;
            border: 2px solid #444;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-family: 'Bungee', cursive;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: #444;
            color: #0bd2f4;
            border-color: #0bd2f4;
            border-bottom: 2px solid #444;
        }

        #searchBar {
            padding: 12px;
            width: 250px;
            font-family: 'Bungee', cursive;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #222;
            color: white;
        }

        .control-btn, #sortSelect {
            background-color: #444;
            color: white;
            border: 2px solid #555;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Bungee', cursive;
            font-size: 14px;
            transition: 0.2s;
        }

        #favToggle.active { background-color: #ffcf40; color: #000; border-color: #ffcf40; }
        #stopBtn { background-color: #ff4b4b; border-color: #a32a2a; }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }

        .item {
            background: #2a2a2a;
            padding: 50px 20px 20px 20px; 
            border-radius: 20px;
            width: 220px;
            border: 2px solid #333;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .item:hover { transform: scale(1.05); border-color: #0bd2f4; }

        .fav-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: transparent;
            -webkit-text-stroke: 2px #ffcf40; 
        }

        .fav-btn.is-fav { color: #ffcf40; -webkit-text-stroke: 0px; }

        /* Image Play Button Overlay Logic */
        .img-container {
            position: relative;
            width: 100%;
            height: 150px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 10px;
            background: #000;
            border: 1px solid #444;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s;
            border-radius: 10px;
        }

        .play-overlay:hover { background: rgba(0, 0, 0, 0.4); }

        .play-icon {
            font-size: 50px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s, transform 0.2s;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .img-container:hover .play-icon { opacity: 0.9; }

        .hidden-audio { display: none; }

        .command-hint {
            color: #0bd2f4;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .copy-btn {
            font-family: 'Bungee', cursive;
            background-color: #ed7612;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px #8a450b;
        }
    </style>
</head>

    let showFavoritesOnly = false;
    let favorites = JSON.parse(localStorage.getItem('cheddaFavs')) || [];
    let currentTab = 'general'; 

    function switchTab(tab) {
        currentTab = tab;
        showFavoritesOnly = false;
        document.getElementById('favToggle').classList.remove('active');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        processShop();
    }
    
    function stopAllAudio() {
        const sounds = document.querySelectorAll('audio');
        sounds.forEach(s => { s.pause(); s.currentTime = 0; });
    }

    function playPreview(id) {
        const audio = document.getElementById(id);
        if (!audio) return;
        stopAllAudio();
        audio.play();
    }

    function processShop() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const sortType = document.getElementById('sortSelect').value;
        const container = document.getElementById('shop-container');

        let items = soundEffects.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchText) || 
                                 item.command.toLowerCase().includes(searchText);
            return showFavoritesOnly ? (matchesSearch && favorites.includes(item.command)) : (matchesSearch && item.cat === currentTab);
        });

        items.sort((a, b) => {
            if (sortType === "az") return a.name.localeCompare(b.name);
            if (sortType === "low") return a.price - b.price;
            return b.price - a.price;
        });

        container.innerHTML = "";
        items.forEach(effect => {
            const isFav = favorites.includes(effect.command) ? "is-fav" : "";
            const folder = effect.cat === "farts" ? "farts" : "sounds";
            const audioId = `audio-${effect.command.replace('!', '')}`;

            container.innerHTML += `
                <div class="item">
                    <button class="fav-btn ${isFav}" onclick="toggleFavorite('${effect.command}')">★</button>
                    
                    <div class="img-container" onclick="playPreview('${audioId}')" oncontextmenu="return false;">
                        <img src="images/${effect.img}">
                        <div class="play-overlay">
                            <span class="play-icon">▶</span>
                        </div>
                    </div>

                    ${effect.media_file ? `
                        <audio id="${audioId}" class="hidden-audio" controlsList="nodownload" oncontextmenu="return false;">
                            <source src="${folder}/${effect.media_file}" type="audio/mpeg">
                        </audio>
                    ` : ''}

                    <h3>${effect.name}</h3>
                    <div class="command-hint">${effect.command}</div>
                    <p class="coin">${effect.price} Coins</p>
                    <button class="copy-btn" onclick="copyCommand(this, '${effect.command}')">Copy Command</button>
                </div>
            `;
        });
    }

    function toggleFavorite(cmd) {
        if (favorites.includes(cmd)) { favorites = favorites.filter(f => f !== cmd); } 
        else { favorites.push(cmd); }
        localStorage.setItem('cheddaFavs', JSON.stringify(favorites));
        processShop(); 
    }

    function toggleFavFilter() {
        showFavoritesOnly = !showFavoritesOnly;
        document.getElementById('favToggle').classList.toggle('active');
        processShop();
    }

    function copyCommand(btn, cmd) {
        navigator.clipboard.writeText(cmd);
        const oldText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.backgroundColor = "#28a745";
        setTimeout(() => { btn.innerText = oldText; btn.style.backgroundColor = "#ed7612"; }, 1000);
    }

    processShop();
