            padding: 20px 10px;
            border-bottom: 2px solid #333;
        }

        body {
            font-family: 'Bungee', cursive;

            text-align: center;
            padding: 0;
            margin: 0;
        }

        .chedda { color: #0bd2f4; }
        .coin { color: #ed7612; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .tab-btn {
            background-color: #333;
            color: #888;
            border: 2px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-family: 'Bungee', cursive;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: #444;
            color: #0bd2f4;
            border-color: #0bd2f4;
        }

        #searchBar {
            padding: 12px;
            width: 220px;
            font-family: 'Bungee', cursive;
            font-size: 14px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #222;
            color: white;
        }

        .control-btn, #sortSelect {
            background-color: #444;
            color: white;
            border: 2px solid #555;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Bungee', cursive;
        }

        #favToggle.active { background-color: #ffcf40; color: #000; border-color: #ffcf40; }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }

        .item {
            background: #2a2a2a;
            padding: 50px 20px 20px 20px; 
            border-radius: 20px;
            width: 220px;
            border: 2px solid #333;
            position: relative;
            transition: transform 0.2s;
        }

        .item:hover { transform: scale(1.02); border-color: #0bd2f4; }

        .fav-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: transparent;
            -webkit-text-stroke: 2px #ffcf40;
            line-height: 1;
        }

        .fav-btn.is-fav { 
            color: #ffcf40; 
            -webkit-text-stroke: 0px; 
        }

        .item img {
            width: 100%;
            height: 140px;
            object-fit: contain; 
            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .copy-btn {
            font-family: 'Bungee', cursive;
            background-color: #ed7612;
            color: white;
            border: 2px solid #a3520d;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            box-shadow: 0 4px #8a450b;
            margin-bottom: 10px;
            text-transform: uppercase;
            transition: 0.1s;
        }

        .copy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px #8a450b;
        }

        .copy-btn.copied {
            background-color: #28a745;
            border-color: #1e7e34;
            box-shadow: 0 4px #155d27;
        }
        
        audio, video { width: 100%; border-radius: 5px; background: #000; margin-top: 10px; }
        video { height: 120px; }
        
    #sub-classic.active { border-color: #89ca12 !important; color: #89ca12 !important; }

</style>

    let showFavoritesOnly = false;
    let favorites = JSON.parse(localStorage.getItem('cheddaFavs')) || [];
    let currentTab = 'general';
    let currentSubTab = 'classic';

    document.addEventListener('play', function(e){
        var auditors = document.querySelectorAll('audio, video');
        for(var i = 0, len = auditors.length; i < len;i++){
            if(auditors[i] != e.target){
                auditors[i].pause();
                auditors[i].currentTime = 0;
            }
        }
    }, true);

    function switchTab(tab) {
        currentTab = tab;
        showFavoritesOnly = false;
        document.getElementById('favToggle').classList.remove('active');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById('sub-tabs').style.display = (tab === 'farts') ? 'flex' : 'none';
        
        // Reset subtab to classic whenever 'farts' tab is opened
        if(tab === 'farts') {
            switchSubTab('classic');
        } else {
            processShop();
        }
    }

    function switchSubTab(sub) {
    currentSubTab = sub;
    // This line removes the old color from all buttons
    document.querySelectorAll('#sub-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
    // This line adds the new color based on the ID
    document.getElementById('sub-' + sub).classList.add('active');
    processShop();
}

    function toggleFavFilter() {
        showFavoritesOnly = !showFavoritesOnly;
        document.getElementById('favToggle').classList.toggle('active');
        processShop();
    }

    function toggleFavorite(cmd) {
        if (favorites.includes(cmd)) {
            favorites = favorites.filter(f => f !== cmd);
        } else {
            favorites.push(cmd);
        }
        localStorage.setItem('cheddaFavs', JSON.stringify(favorites));
        processShop();
    }

    function copyToClipboard(btn, text) {
        navigator.clipboard.writeText(text);
        btn.innerText = "COPIED!";
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerText = "COPY COMMAND";
            btn.classList.remove('copied');
        }, 1500);
    }

    function stopAllMedia() {
        document.querySelectorAll('audio, video').forEach(m => { m.pause(); m.currentTime = 0; });
    }

    function processShop() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const sortType = document.getElementById('sortSelect').value;
        const container = document.getElementById('shop-container');

        let items = soundEffects.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchText) || item.command.toLowerCase().includes(searchText);
            if (showFavoritesOnly) return matchesSearch && favorites.includes(item.command);
            const matchesTab = item.cat === currentTab;
            if (currentTab === 'farts') return matchesSearch && matchesTab && item.sub === currentSubTab;
            return matchesSearch && matchesTab;
        });

        if (sortType === "az") items.sort((a, b) => a.name.localeCompare(b.name));
        else if (sortType === "low") items.sort((a, b) => a.price - b.price);
        else if (sortType === "high") items.sort((a, b) => b.price - a.price);

        container.innerHTML = "";
        items.forEach(effect => {
            const isFav = favorites.includes(effect.command) ? "is-fav" : "";
            let folder = (effect.cat === "farts") ? "farts" : (effect.cat === "webm" ? "webm" : "soundboard");
            
            let mediaHTML = "";
            if (effect.cat === "webm") {
                mediaHTML = `<video controls src="${folder}/${effect.media_file}" preload="none"></video>`;
            } else {
                mediaHTML = `<audio controls src="${folder}/${effect.media_file}" preload="none"></audio>`;
            }

           container.innerHTML += '<div class="item">' +
                '<button class="fav-btn ' + isFav + '" onclick="toggleFavorite(\'' + effect.command + '\')">★</button>' +
                '<img src="images/' + effect.img + '" loading="lazy" onerror="this.src=\'images/default.png\'">' +
                '<h3>' + effect.name + '</h3>' +
                '<div style="color:rgba(255,255,255,0.5); font-size: 0.8em; margin-top: -5px; margin-bottom: 10px; font-weight: bold;">' + effect.command + '</div>' +
                '<div style="color:#0bd2f4; margin-bottom:10px;">' + effect.price + ' Coins</div>' +
                '<button class="copy-btn" onclick="copyToClipboard(this, \'' + effect.command + '\')">COPY COMMAND</button>' +
                mediaHTML +
            '</div>';
        });
    }
    processShop();
</script>
