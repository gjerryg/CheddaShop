<!DOCTYPE html>
<html>
<head>
<title>CheddaCoin Shop</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
.shop { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:40px; }
.item { background:#1e1e1e; padding:20px; border-radius:10px; }
.item img { width:100%; height:auto; border-radius:6px; }
button { padding:10px 20px; background:#00c853; border:none; color:white; border-radius:6px; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>

<h1>CheddaCoin Shop</h1>

<div class="shop" id="shop-container"></div>

<script>
    // 1. THIS IS YOUR LIST. Just add new items here!
    const soundEffects = [
        { name: "AK47", price: 25, img: "ak47.jpg", command: "!ak47" },
        { name: "Airhorn", price: 10, img: "airhorn.png", command: "!airhorn" },
        { name: "Bruh", price: 15, img: "bruh.png", command: "!bruh" },
        { name: "Fart", price: 5, img: "fart.png", command: "!fart" },
        { name: "Cum", price: 5, img: "cum.png", command: "!cum" },
        // To add more, just copy the line above, paste it below, and change the info.
    ];

    // 2. THE COMPUTER ROBOT (The Loop)
    const container = document.getElementById('shop-container');

    soundEffects.forEach(effect => {
        // This "template" creates the HTML for you automatically
        const itemHtml = `
            <div class="item">
                <img src="images/${effect.img}" alt="${effect.name}">
                <h3>${effect.name}</h3>
                <p>${effect.price} Coins</p>
                <button onclick="copyCommand('${effect.command}')">Copy Command</button>
            </div>
        `;
        container.innerHTML += itemHtml;
    });

    // 3. YOUR ORIGINAL COPY FUNCTION
    function copyCommand(cmd) {
        navigator.clipboard.writeText(cmd).then(() => {
            alert("Command " + cmd + " copied! Paste it into Twitch chat.");
        });
    }
</script>

</body>
