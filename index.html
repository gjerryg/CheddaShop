<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Bungee', cursive;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .chedda { color: #0bd2f4; }
        .coin { color: #ed7612; }

        #searchBar {
            padding: 15px;
            width: 80%;
            max-width: 400px;
            font-family: 'Bungee', cursive;
            font-size: 18px;
            margin-bottom: 40px;
            border-radius: 10px;
            border: 3px solid #333;
            background: #222;
            color: white;
        }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        /* UPDATED ITEM BOX */
        .item {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 20px;
            width: 220px;
            border: 2px solid #333;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item:hover {
            transform: scale(1.05);
            border-color: #0bd2f4;
        }

        /* UPDATED IMAGE STYLING */
        .item img {
            width: 100%;
            height: 150px;
            object-fit: contain; 
            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        /* NEW READABLE TITLE STYLING */
        .item h3 {
            font-size: 18px;
            margin: 10px 0;
            letter-spacing: 1.5px; /* Pushes letters apart */
            color: #ffffff;
            /* BLACK OUTLINE */
            text-shadow: 2px 2px 0px #000, 
                        -1px -1px 0px #000,  
                         1px -1px 0px #000,
                        -1px  1px 0px #000,
                         1px  1px 0px #000;
        }

        .item p {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        button {
            font-family: 'Bungee', cursive;
            background-color: #ed7612;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            box-shadow: 0 4px #8a450b;
            transition: 0.1s;
        }

        button:active {
            box-shadow: 0 0px #8a450b;
            transform: translateY(4px);
        }

        button:hover {
            background-color: #ff8c2e;
        }
    </style>
</head>
<body>

    <h1><span class="chedda">Chedda</span><span class="coin">Coin</span> Shop</h1>

    <input type="text" id="searchBar" placeholder="Search for redeem..." onkeyup="filterShop()">

    <div class="shop" id="shop-container"></div>

<script>
    const soundEffects = [
         { name: "18 Beers", price: 5, img: "18.png", command: "!18" },
         { name: "Chinese Meal", price: 5, img: "chinese.png", command: "!chinese" },
         { name: "AK47", price: 5, img: "ak47.png", command: "!ak47" },
         { name: "Am I Ugly", price: 5, img: "amiugly.png", command: "!amiugly" },
         { name: "Bas Rutten 01", price: 5, img: "basrutten.png", command: "!basrutten01" },
         { name: "Bas Rutten 02", price: 5, img: "basrutten.png", command: "!basrutten02" },
         { name: "Bas Rutten 03", price: 5, img: "basrutten.png", command: "!basrutten03" },
         { name: "Bas Rutten 04", price: 5, img: "basrutten.png", command: "!basrutten04" },
         { name: "Beef Quesrito", price: 5, img: "tacobell.png", command: "!tacobell" },
         { name: "Belly Button", price: 5, img: "singer.png", command: "!bellybutton" },
    ];

    const container = document.getElementById('shop-container');

    function displayShop(items) {
        container.innerHTML = ""; 
        items.forEach(effect => {
            container.innerHTML += `
                <div class="item">
                    <img src="images/${effect.img}" alt="${effect.name}">
                    <h3>${effect.name}</h3>
                    <p>${effect.price} Coins</p>
                    <button onclick="copyCommand('${effect.command}')">Copy Command</button>
                </div>
            `;
        });
    }

    function filterShop() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const filteredItems = soundEffects.filter(item => 
            item.name.toLowerCase().includes(searchText)
        );
        displayShop(filteredItems);
    }

    function copyCommand(cmd) {
        navigator.clipboard.writeText(cmd).then(() => {
            console.log("Copied " + cmd);
        });
        event.target.innerText = "COPIED!";
        const btn = event.target;
        setTimeout(() => { btn.innerText = "COPY COMMAND"; }, 1000);
    }

    displayShop(soundEffects);
</script>

</body>
</html>
